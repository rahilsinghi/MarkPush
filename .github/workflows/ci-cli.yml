name: CLI CI

on:
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/ci-cli.yml'
  pull_request:
    paths:
      - 'cli/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum

      - name: Build
        run: cd cli && go build ./...

      - name: Test
        run: cd cli && go test ./... -race -coverprofile=coverage.out

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cli/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: cd cli && go build -ldflags="-s -w" -o ../bin/markpush-${{ matrix.goos }}-${{ matrix.goarch }} .

name: iOS CI

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ci-ios.yml'
  pull_request:
    paths:
      - 'ios/**'

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -project ios/MarkPush.xcodeproj \
            -scheme MarkPush \
            -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Test
        run: |
          xcodebuild test \
            -project ios/MarkPush.xcodeproj \
            -scheme MarkPush \
            -destination 'platform=iOS Simulator,name=iPhone 16'

name: MarkPush
options:
  bundleIdPrefix: com.rahilsinghi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted

packages:
  swift-composable-architecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.15.0"
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.16.0"
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"
  CodeScanner:
    url: https://github.com/twostraws/CodeScanner
    from: "2.5.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  MarkPush:
    type: application
    platform: iOS
    sources:
      - path: MarkPush
    settings:
      base:
        INFOPLIST_FILE: MarkPush/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.rahilsinghi.markpush
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies:
      - package: swift-composable-architecture
        product: ComposableArchitecture
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash
      - package: supabase-swift
        product: Supabase
      - package: CodeScanner
        product: CodeScanner
      - package: KeychainAccess
        product: KeychainAccess
    entitlements:
      path: MarkPush/MarkPush.entitlements

  MarkPushTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MarkPushTests
    dependencies:
      - target: MarkPush
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MarkPush.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MarkPush"
        GENERATE_INFOPLIST_FILE: true

schemes:
  MarkPush:
    build:
      targets:
        MarkPush: all
        MarkPushTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MarkPushTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
